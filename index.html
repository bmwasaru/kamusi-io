<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kamusi ya Kiswahili</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d4ed8">
    <link rel="apple-touch-icon" href="assets/icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="assets/icon-512.png">
    <link rel="shortcut icon" href="assets/icon-512.png">
    <link rel="apple-touch-icon" href="assets/icon-512.png">
    
    <style>
        :root {
            --app-theme-color: #1d4ed8;
        }

        html {
            background-color: var(--app-theme-color);
        }

        body {
            margin: 0;
        }

        .app-header {
            background-color: var(--app-theme-color);

            padding-top: calc(
            1.5rem + env(safe-area-inset-top, 0px)
            );

            padding-right: calc(
            1.5rem + env(safe-area-inset-right, 0px)
            );

            padding-bottom: 1.5rem;

            padding-left: calc(
            1.5rem + env(safe-area-inset-left, 0px)
            );
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="app-header text-white shadow-lg">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl font-bold">Kamusi</h1>
            <p class="mt-2 opacity-80">Tafuta maneno ya Kiswahili kwa urahisi</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="wordOfDayContainer"></div>
        <div class="relative mt-4">
            <input type="text" id="searchInput" placeholder="Tafuta neno hapa..." 
                   class="w-full p-4 rounded-lg border shadow focus:ring-2 focus:ring-blue-500 outline-none">
        </div>

        <div id="results" class="mt-8 space-y-4">
            <p class="text-center text-gray-500">Pakia data kuanza...</p>
        </div>
    </main>

    <footer class="mt-12 pb-8 text-center text-gray-500 text-sm">
        <p>Maneno kwa hisani ya Jordan Kalebu 
            <a href="https://github.com/Kalebu/kamusi" target="_blank" class="text-blue-600 hover:underline">
                Kalebu/kamusi
            </a>
        </p>
        <p class="mb-2 italic">
        Kazi hii imetolewa katika 
        <a href="https://creativecommons.org/publicdomain/zero/1.0/" target="_blank" class="text-blue-600 hover:underline">
            Uwanja wa Umma (Public Domain - CC0)
        </a>.
    </p>
</footer>

<!-- Installation Banner -->
<div id="pwaInstallBanner" class="hidden fixed bottom-0 left-0 right-0 max-w-xl mx-auto m-4 bg-white rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.2)] transform translate-y-full transition-transform duration-500 ease-out z-50 border border-gray-100 overflow-hidden">
    <div class="p-5 flex items-center justify-between border-l-8 border-blue-600">
        <div class="flex items-center space-x-4">
            <!-- App Icon Wrapper -->
            <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center shadow-md text-white font-bold text-2xl">
                K
            </div>
            <div>
                <h3 class="font-bold text-gray-900 text-base">Weka Kamusi Yangu</h3>
                <p class="text-xs text-gray-500 mt-0.5">Tumia bila mtandao na kwa haraka zaidi!</p>
            </div>
        </div>
        <div class="flex flex-col space-y-2">
            <button id="pwaInstallBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-2.5 rounded-lg transition-colors shadow-sm tracking-wide">
                WEKA
            </button>
            <button id="pwaCloseBtn" class="text-gray-400 hover:text-gray-600 text-xs font-medium py-1">
                Baadaye
            </button>
        </div>
    </div>
</div>

    <script>
        let dictionaryData = [];

        // Load JSON data
        fetch('./data/words.json')
            .then(response => response.json())
            .then(data => {
                dictionaryData = data;
                displayWordOfTheDay(data);
                document.getElementById('results').innerHTML = '<p class="text-center text-gray-500">Tayari! Tafuta neno lolote.</p>';
            });

        // Search Logic
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 2) {
                resultsDiv.innerHTML = "";
                return;
            }

            const matches = dictionaryData.filter(item => 
                item.word.toLowerCase().startsWith(query)
            ).slice(0, 20); // Show top 20 matches

            displayResults(matches);
        });

        // 3. Display Logic
        function displayResults(matches) {
            const resultsDiv = document.getElementById('results');
            
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<p class="text-center text-gray-500">Neno halikupatikana.</p>';
                return;
            }

            resultsDiv.innerHTML = matches.map(item => {
                // 1. Split multiple meanings (separated by | in our JSON)
                const meaningsArray = item.meaning.split(' | ').filter(m => m.trim() !== '');
                
                // 2. Split multiple sentences if they exist
                const sentencesArray = item.sentence.split(' | ').filter(s => s.trim() !== '');

                return `
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-600 mb-6">
                        <div class="flex justify-between items-start mb-3">
                            <h2 class="text-2xl font-bold text-gray-900">${item.word}</h2>
                            ${item.conjugation ? `<span class="text-xs font-mono bg-gray-100 px-2 py-1 rounded text-gray-500">${item.conjugation}</span>` : ''}
                        </div>
                        
                        <ul class="space-y-2 mb-4">
                            ${meaningsArray.map((m, index) => `
                                <li class="text-gray-800 flex">
                                    <span class="font-bold text-blue-600 mr-2">${index + 1}.</span>
                                    <span>${m}</span>
                                </li>
                            `).join('')}
                        </ul>

                        ${sentencesArray.length > 0 ? `
                            <div class="mt-4 p-4 bg-blue-50 rounded-lg border-l-2 border-blue-200">
                                <p class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-2">Mifano katika sentensi</p>
                                <ul class="list-disc list-inside space-y-1">
                                    ${sentencesArray.map(s => `
                                        <li class="text-gray-700 italic leading-relaxed">"${s}"</li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}

                        ${item.synonyms ? `
                            <div class="mt-4 pt-3 border-t border-gray-100">
                                <p class="text-sm text-gray-500">
                                    <span class="font-semibold text-gray-700">Visawe:</span> ${item.synonyms}
                                </p>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function getWordOfTheDay(data) {
            if (!Array.isArray(data) || data.length === 0) {
                return null;
            }

            const now = new Date();

            // user's local date.
            const dateString = [
                now.getFullYear(),
                String(now.getMonth() + 1).padStart(2, '0'),
                String(now.getDate()).padStart(2, '0')
            ].join('-');

            // well-distributed integer from the date.
            let hash = 2166136261;

            for (let i = 0; i < dateString.length; i++) {
                hash ^= dateString.charCodeAt(i);
                hash = Math.imul(hash, 16777619);
            }

            const index = (hash >>> 0) % data.length;

            return data[index];
        }

        function displayWordOfTheDay(data) {
            const wod = getWordOfTheDay(data);
            const container = document.getElementById('wordOfDayContainer');

            if (!wod) {
                container.innerHTML = `
                <p class="text-center text-red-500">
                    Neno la leo halikuweza kupatikana.
                </p>
                `;
                return;
            }
            
            // We use the same formatting as our search results
            container.innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-blue-800 p-1 rounded-xl shadow-lg mb-8">
                    <div class="bg-white p-6 rounded-lg">
                        <div class="flex items-center mb-2">
                            <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded mr-2 uppercase">Neno la Leo</span>
                            <span class="text-gray-400 text-xs">${new Date().toLocaleDateString('sw-KE')}</span>
                        </div>
                        <h2 class="text-3xl font-black text-gray-900 mb-2">${wod.word}</h2>
                        <p class="text-gray-700 leading-relaxed mb-4">${wod.meaning.split('|')[0]}</p>
                        ${wod.sentence ? `<p class="italic text-blue-600 text-sm">"${wod.sentence.split('|')[0]}"</p>` : ''}
                    </div>
                </div>
            `;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            // This shows an alert if a new version is ready
                            if (confirm("Toleo jipya linapatikana! Je, ungependa kupakia upya?")) {
                                window.location.reload();
                            }
                        }
                    });
                });
            });
        }

        let localDeferredPrompt;
        const installBanner = document.getElementById('pwaInstallBanner');
        const installBtn = document.getElementById('pwaInstallBtn');
        const closeBtn = document.getElementById('pwaCloseBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            let deferredInstallPrompt = null;

            const installBanner = document.getElementById('pwaInstallBanner');
            const installButton = document.getElementById('pwaInstallBtn');
            const closeButton = document.getElementById('pwaCloseBtn');

            window.addEventListener('beforeinstallprompt', event => {
            event.preventDefault();
            deferredInstallPrompt = event;

            if (!localStorage.getItem('kamusi_install_dismissed')) {
                installBanner.classList.remove('hidden');

                requestAnimationFrame(() => {
                installBanner.classList.remove('translate-y-full');
                });
            }
            });

            installButton.addEventListener('click', async () => {
            if (!deferredInstallPrompt) {
                return;
            }

            deferredInstallPrompt.prompt();
            const result = await deferredInstallPrompt.userChoice;

            deferredInstallPrompt = null;

            if (result.outcome === 'accepted') {
                dismissInstallBanner();
            }
            });
        });

        installBtn.addEventListener('click', async () => {
            if (localDeferredPrompt) {
                // Trigger the native browser prompt layer
                localDeferredPrompt.prompt();
                const { outcome } = await localDeferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    dismissInstallBanner();
                }
                localDeferredPrompt = null;
            } else {
                // 2. Fallback Path: Identify user agent
                const isAndroid = /Android/i.test(navigator.userAgent);
                const isChrome = /Chrome/i.test(navigator.userAgent) || /CriOS/i.test(navigator.userAgent);

                if (isAndroid || isChrome) {
                    // Transform the banner into a visual step-by-step instruction guide
                    const textContainer = installBanner.querySelector('p.text-gray-500');
                    const titleContainer = installBanner.querySelector('h3.font-bold');
                    
                    titleContainer.textContent = "Sakinisha Kupitia Chrome";
                    textContainer.innerHTML = `
                        <span class="block mt-1 text-gray-700 font-medium">Bonyeza alama ya vidoti vitatu <strong class="text-blue-700 font-bold">⋮</strong> juu kulia, kisha uchague <strong class="text-blue-700 font-bold">"Add to Home screen"</strong> au <strong class="text-blue-700 font-bold">"Install app"</strong>.</span>
                    `;
                    
                    // Change the button text to make it clear they need to look at the menu
                    installBtn.textContent = "Nimeelewa";
                    installBtn.onclick = () => dismissInstallBanner();
                } else {
                    // Fallback for iOS/Safari users
                    alert("Kwenye iOS (iPhone): Bonyeza alama ya 'Share' (Mshale) kisha chagua 'Add to Home Screen'.");
                    dismissInstallBanner();
                }
            }
        });

        closeBtn.addEventListener('click', () => {
            dismissInstallBanner();
            // Persist choice so returning users aren't pestered continuously
            localStorage.setItem('kamusi_install_dismissed', 'true');
        });

        function dismissInstallBanner() {
            installBanner.classList.add('translate-y-full');
            setTimeout(() => {
                installBanner.classList.add('hidden');
            }, 500); // Wait for the transition slide animation to complete
        }
    </script>
</body>
</html>
